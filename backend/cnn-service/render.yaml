services:
  - type: web
    name: ffds-cnn-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MODEL_PATH
        value: ./model/ffds_mobilenetv2.h5
      - key: PORT
        value: 8000
