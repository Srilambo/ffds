services:
  - type: web
    name: ffds-core-api
    env: node
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/auth/me
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CNN_SERVICE_URL
        sync: false
